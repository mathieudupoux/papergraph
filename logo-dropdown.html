<button id="logoMenuBtn" class="logo-menu-btn">
    <img src="assets/logo-papergraph.svg" alt="papergraph" class="logo-icon">
    <span class="logo-text">papergraph</span>
</button>

<div id="logoDropdown" class="logo-dropdown">
    <button class="logo-dropdown-item" id="logoDashboardBtn">
        <svg class="ui-icon ui-icon--md" aria-hidden="true"><use href="assets/icons/ui-sprite.svg#dashboard"></use></svg>
        <span>Dashboard</span>
    </button>
    <button class="logo-dropdown-item" id="logoNewProjectBtn" onclick="createNewProject()">
        <svg class="ui-icon ui-icon--md" aria-hidden="true"><use href="assets/icons/ui-sprite.svg#add"></use></svg>
        <span>New Project</span>
    </button>
    <button class="logo-dropdown-item logo-dropdown-item-submenu editor-only-item" id="logoImportMenu">
        <span class="logo-dropdown-icon-slot projects-only-icon" aria-hidden="true"></span>
        <span>Import</span>
        <svg class="ui-icon ui-icon--xs submenu-arrow" aria-hidden="true"><use href="assets/icons/ui-sprite.svg#chevron-right"></use></svg>
    </button>
    <button class="logo-dropdown-item logo-dropdown-item-submenu editor-only-item" id="logoExportMenu">
        <svg class="ui-icon ui-icon--md" aria-hidden="true"><use href="assets/icons/ui-sprite.svg#download"></use></svg>
        <span>Export</span>
        <svg class="ui-icon ui-icon--xs submenu-arrow" aria-hidden="true"><use href="assets/icons/ui-sprite.svg#chevron-right"></use></svg>
    </button>

    <div id="logoViewSection" class="logo-dropdown-divider-section editor-only-item">
        <div class="logo-dropdown-divider"></div>
        <div class="logo-dropdown-section-title">View</div>
        <button class="logo-dropdown-item logo-dropdown-item-submenu" id="logoNodeLabelMenu">
            <svg class="ui-icon ui-icon--md" aria-hidden="true"><use href="assets/icons/ui-sprite.svg#labels"></use></svg>
            <span>Node Labels</span>
            <svg class="ui-icon ui-icon--xs submenu-arrow" aria-hidden="true"><use href="assets/icons/ui-sprite.svg#chevron-right"></use></svg>
        </button>
    </div>

    <div class="logo-dropdown-divider"></div>
    <div class="logo-dropdown-section-title">Gallery</div>
    <button class="logo-dropdown-item" id="logoGalleryBtn">
        <span class="logo-dropdown-icon-slot" aria-hidden="true"></span>
        <span>Explore Gallery</span>
    </button>
    <button class="logo-dropdown-item" id="logoSubmitBtn">
        <span class="logo-dropdown-icon-slot" aria-hidden="true"></span>
        <span>Submit to Gallery</span>
    </button>

    <div class="logo-dropdown-divider"></div>
    <div class="logo-dropdown-section-title">Help</div>
    <button class="logo-dropdown-item" id="logoHelpBtn" onclick="window.open('https://github.com/remyvallot/papergraph#readme', '_blank')">
        <svg class="ui-icon ui-icon--md" aria-hidden="true"><use href="assets/icons/ui-sprite.svg#help"></use></svg>
        <span>Help</span>
    </button>
    <button class="logo-dropdown-item" id="logoReportBugBtn" onclick="window.open('https://github.com/remyvallot/papergraph/issues/new', '_blank')">
        <span class="logo-dropdown-icon-slot" aria-hidden="true"></span>
        <span>Report Bug</span>
    </button>
</div>

<div id="logoImportSubmenu" class="dropdown-submenu">
    <button class="logo-dropdown-item" id="logoImportProjectBtn" onclick="if(typeof importProject==='function') importProject()">
        <svg class="ui-icon ui-icon--md" aria-hidden="true"><use href="assets/icons/ui-sprite.svg#file"></use></svg>
        <span>Import Project</span>
    </button>
    <button class="logo-dropdown-item" id="logoImportBibtexBtn" onclick="if(typeof importBibtex==='function') importBibtex()">
        <svg class="ui-icon ui-icon--md" aria-hidden="true"><use href="assets/icons/ui-sprite.svg#file-text"></use></svg>
        <span>Import BibTeX (.bib)</span>
    </button>
</div>

<div id="logoExportSubmenu" class="dropdown-submenu editor-only-item">
    <button class="logo-dropdown-item" id="logoExportProjectBtn">
        <svg class="ui-icon ui-icon--md" aria-hidden="true"><use href="assets/icons/ui-sprite.svg#file"></use></svg>
        <span>Export Project</span>
    </button>
    <button class="logo-dropdown-item" id="logoExportBibtexBtn">
        <svg class="ui-icon ui-icon--md" aria-hidden="true"><use href="assets/icons/ui-sprite.svg#file-text"></use></svg>
        <span>Export BibTeX (.bib)</span>
    </button>
    <button class="logo-dropdown-item" id="logoExportPdfBtn">
        <span class="logo-dropdown-icon-slot" aria-hidden="true"></span>
        <span>Export PDF (LaTeX)</span>
    </button>
    <button class="logo-dropdown-item" id="logoExportLatexBtn">
        <span class="logo-dropdown-icon-slot" aria-hidden="true"></span>
        <span>Export LaTeX (.tex)</span>
    </button>
    <button class="logo-dropdown-item" id="logoExportImageBtn">
        <svg class="ui-icon ui-icon--md" aria-hidden="true"><use href="assets/icons/ui-sprite.svg#image"></use></svg>
        <span>Export Image (.png)</span>
    </button>
    <button class="logo-dropdown-item" id="logoExportSVGBtn">
        <span class="logo-dropdown-icon-slot" aria-hidden="true"></span>
        <span>Export Image (.svg)</span>
    </button>
</div>

<div id="logoNodeLabelSubmenu" class="dropdown-submenu editor-only-item">
    <button class="logo-dropdown-item node-label-option" data-format="bibtexId">
        <span>BibTeX ID</span>
    </button>
    <button class="logo-dropdown-item node-label-option" data-format="title">
        <span>Title</span>
    </button>
    <button class="logo-dropdown-item node-label-option" data-format="citation">
        <span>Citation (Author, Year)</span>
    </button>
    <button class="logo-dropdown-item node-label-option" data-format="author">
        <span>First Author</span>
    </button>
</div>
