name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Active le cache pour éviter les bugs réseau npm

      - name: Install dependencies
        # On utilise --no-audit pour accélérer et éviter des blocages inutiles
        run: npm install --no-audit

      - name: Build project
        # On utilise npx pour être sûr de trouver vite
        run: npx vite build

      - name: Check if dist exists
        # Cette étape vérifie si le dossier dist est bien là avant de continuer
        run: ls -al dist

      - name: Deploy to GitHub Pages
        if: success() # Ne se lance que si tout ce qui précède est OK
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true