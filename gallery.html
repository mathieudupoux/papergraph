<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Gallery - Papergraph</title>
    
    <link href="https://api.fontshare.com/v2/css?f[]=chillax@400,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Modular CSS - Base -->
    <link rel="stylesheet" href="css/base/theme.css">
    <link rel="stylesheet" href="css/base/dark-theme.css">
    <link rel="stylesheet" href="css/base/reset.css">
    <link rel="stylesheet" href="css/base/typography.css">
    
    <!-- Modular CSS - Components -->
    <link rel="stylesheet" href="css/components/buttons.css">
    <link rel="stylesheet" href="css/components/icons.css">
    <link rel="stylesheet" href="css/components/dropdown.css">
    <link rel="stylesheet" href="css/components/modals.css">
    <link rel="stylesheet" href="css/components/footer.css">
    <link rel="stylesheet" href="css/pages/landing.css">
    <link rel="stylesheet" href="css/pages/dashboard.css">
    <link rel="stylesheet" href="css/pages/auth-modal.css">
    <link rel="stylesheet" href="css/components/user-dropdown.css">
    
    <!-- Gallery View -->
    <link rel="stylesheet" href="css/views/gallery.css">

    <link rel="icon" type="image/svg+xml" href="assets/logo-papergraph.svg">
</head>
<body>
    <div class="pg-page pg-page--workspace">
        <div class="logo-menu-container">
            <button id="logoMenuBtnPage" class="logo-menu-btn">
                <img src="assets/logo-papergraph.svg" alt="papergraph" class="logo-icon">
                <span class="logo-text">papergraph</span>
            </button>
        </div>
        <div class="logo-dropdown-container" data-include="logo-dropdown"></div>

        <div id="galleryUserMenu" class="user-dropdown-container editor-user-dropdown" data-include="user-dropdown" style="display: none;"></div>

        <div id="galleryAuthActions" class="pg-gallery-auth-actions" style="display: none;">
            <button class="btn-secondary pg-cta-btn pg-cta-btn--secondary pg-cta-btn--sm" type="button" onclick="openAuthModal('signin')">Sign in</button>
            <button class="btn-primary pg-cta-btn pg-cta-btn--primary pg-cta-btn--sm" type="button" onclick="openAuthModal('signup')">Sign up</button>
        </div>

        <!-- Main Content -->
        <main class="pg-main">
            <div class="pg-dashboard-header">
                <div class="pg-dashboard-heading">
                    <p class="pg-dashboard-kicker">Community</p>
                    <h1>Explore Gallery</h1>
                    <p class="pg-dashboard-subtitle">Browse public research graphs, discover structures that work, and share your own when you're ready.</p>
                </div>
                <div class="pg-header-buttons">
                    <button id="submitToGalleryBtn" class="btn-primary pg-cta-btn pg-cta-btn--primary btn-with-icon" onclick="openSubmitToGalleryModal()" style="display: none;">
                        <svg class="ui-icon ui-icon--md" aria-hidden="true"><use href="assets/icons/ui-sprite.svg#upload"></use></svg>
                        Submit to Gallery
                    </button>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loadingState" style="text-align: center; padding: 80px 32px; color: #999;">
                <p>Loading gallery projects...</p>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="pg-empty-state" style="display: none;">
                <h2>No projects in the gallery yet</h2>
                <p>Be the first to share your research with the community!</p>
                <button class="btn-primary pg-cta-btn pg-cta-btn--primary" onclick="openSubmitToGalleryModal()">Submit a Project</button>
            </div>

            <!-- Gallery Grid -->
            <div id="galleryGrid" class="pg-projects-grid" style="display: none;">
                <!-- Project cards will be loaded here -->
            </div>
        </main>

        <!-- Footer -->
        <div data-include="footer"></div>
    </div>

    <!-- Preferences Modal -->
    <div data-include="preferences-modal"></div>

    <!-- Submit to Gallery Modal -->
    <div data-include="submit-gallery-modal"></div>

    <!-- Auth Modal -->
    <div data-include="auth-modal"></div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Gallery Logic -->
    <script type="module" src="js/pages/gallery-page.js"></script>
</body>
</html>
